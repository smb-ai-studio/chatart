<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Seedance 2.5 prompt guide storyboard</title>
  <desc id="desc">A tutorial diagram showing a Seedance 2.5 prompt moving from brief to references, 30 second scene beats, camera and audio direction, and output review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaff"/>
      <stop offset="0.55" stop-color="#f1efff"/>
      <stop offset="1" stop-color="#e8fbff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f9f7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#44215d" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="48" fill="url(#bg)"/>
  <circle cx="1330" cy="130" r="210" fill="#5cfff5" opacity="0.18"/>
  <circle cx="220" cy="760" r="260" fill="#7c5cff" opacity="0.10"/>
  <text x="110" y="130" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="3">SEEDANCE 2.5 PROMPT GUIDE</text>
  <text x="110" y="205" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="850">Write prompts like a 30-second scene plan.</text>
  <text x="112" y="258" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="30">Brief + references + camera + audio + review criteria.</text>
  <g filter="url(#shadow)">
    <rect x="110" y="340" width="260" height="230" rx="28" fill="url(#card)" stroke="#ded8ff"/>
    <text x="145" y="395" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">01 BRIEF</text>
    <text x="145" y="448" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">What is the</text>
    <text x="145" y="487" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">scene job?</text>
    <text x="145" y="532" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="21">Audience, output,</text>
    <text x="145" y="561" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="21">format, review goal.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="430" y="340" width="260" height="230" rx="28" fill="url(#card)" stroke="#ded8ff"/>
    <text x="465" y="395" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">02 REFERENCES</text>
    <text x="465" y="448" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Show what</text>
    <text x="465" y="487" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">text cannot.</text>
    <text x="465" y="532" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="21">Product, person,</text>
    <text x="465" y="561" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="21">style, audio, space.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="750" y="340" width="260" height="230" rx="28" fill="url(#card)" stroke="#ded8ff"/>
    <text x="785" y="395" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">03 30 SECONDS</text>
    <text x="785" y="448" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Start, middle,</text>
    <text x="785" y="487" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">final frame.</text>
    <text x="785" y="532" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="21">Plan the video as</text>
    <text x="785" y="561" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="21">one coherent arc.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1070" y="340" width="260" height="230" rx="28" fill="url(#card)" stroke="#ded8ff"/>
    <text x="1105" y="395" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">04 DIRECT</text>
    <text x="1105" y="448" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Camera, audio,</text>
    <text x="1105" y="487" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">edit target.</text>
    <text x="1105" y="532" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="21">Name the move,</text>
    <text x="1105" y="561" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="21">sound, and fix area.</text>
  </g>
  <path d="M380 455 L420 455" stroke="#7c5cff" stroke-width="6" stroke-linecap="round"/>
  <path d="M700 455 L740 455" stroke="#7c5cff" stroke-width="6" stroke-linecap="round"/>
  <path d="M1020 455 L1060 455" stroke="#7c5cff" stroke-width="6" stroke-linecap="round"/>
  <rect x="110" y="650" width="1220" height="92" rx="24" fill="#17112a"/>
  <text x="150" y="706" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="750">Prompt pattern:</text>
  <text x="370" y="706" fill="#d8d3ff" font-family="Inter, Arial, sans-serif" font-size="27">scene + references + beat timing + camera + audio + review checklist</text>
</svg>
