<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Seedance 2.5 multimodal reference stack</title>
  <desc id="desc">A diagram explaining how to combine product, character, environment, style, audio, and motion references with a text prompt.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9f7ff"/>
      <stop offset="1" stop-color="#ecfbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#44215d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="48" fill="url(#bg)"/>
  <text x="100" y="112" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="3">REFERENCE STACK</text>
  <text x="100" y="178" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="850">Use references for identity. Use text for action.</text>
  <text x="102" y="229" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="28">A strong Seedance 2.5 prompt separates what you can show from what you must direct.</text>
  <g filter="url(#shadow)">
    <rect x="90" y="310" width="940" height="430" rx="32" fill="#fff" stroke="#ded8ff"/>
    <text x="130" y="365" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Reference pool</text>
    <g font-family="Inter, Arial, sans-serif">
      <rect x="130" y="410" width="245" height="96" rx="22" fill="#f3f0ff"/><text x="160" y="455" fill="#4d2fc8" font-size="22" font-weight="800">Product image</text><text x="160" y="486" fill="#6d6685" font-size="18">Shape, logo, color</text>
      <rect x="405" y="410" width="245" height="96" rx="22" fill="#f3f0ff"/><text x="435" y="455" fill="#4d2fc8" font-size="22" font-weight="800">Character image</text><text x="435" y="486" fill="#6d6685" font-size="18">Face, wardrobe</text>
      <rect x="680" y="410" width="245" height="96" rx="22" fill="#f3f0ff"/><text x="710" y="455" fill="#4d2fc8" font-size="22" font-weight="800">Location image</text><text x="710" y="486" fill="#6d6685" font-size="18">Scene anchor</text>
      <rect x="130" y="540" width="245" height="96" rx="22" fill="#effcff"/><text x="160" y="585" fill="#0d7280" font-size="22" font-weight="800">Style video</text><text x="160" y="616" fill="#6d6685" font-size="18">Color and pacing</text>
      <rect x="405" y="540" width="245" height="96" rx="22" fill="#effcff"/><text x="435" y="585" fill="#0d7280" font-size="22" font-weight="800">Audio sample</text><text x="435" y="616" fill="#6d6685" font-size="18">Mood and rhythm</text>
      <rect x="680" y="540" width="245" height="96" rx="22" fill="#effcff"/><text x="710" y="585" fill="#0d7280" font-size="22" font-weight="800">Motion clip</text><text x="710" y="616" fill="#6d6685" font-size="18">Movement logic</text>
    </g>
  </g>
  <g filter="url(#shadow)">
    <rect x="1080" y="310" width="420" height="430" rx="32" fill="#17112a"/>
    <text x="1120" y="365" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Text prompt</text>
    <text x="1120" y="425" fill="#d8d3ff" font-family="Inter, Arial, sans-serif" font-size="24">Use text for what</text>
    <text x="1120" y="458" fill="#d8d3ff" font-family="Inter, Arial, sans-serif" font-size="24">references cannot tell:</text>
    <text x="1120" y="525" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="750">• action</text>
    <text x="1120" y="570" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="750">• camera move</text>
    <text x="1120" y="615" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="750">• timing</text>
    <text x="1120" y="660" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="750">• final frame</text>
  </g>
  <path d="M1030 525 C1060 525 1055 525 1075 525" stroke="#7c5cff" stroke-width="8" stroke-linecap="round"/>
  <text x="102" y="810" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="24">Rule of thumb: if identity, style, or sound already exists, reference it. Save the written prompt for direction.</text>
</svg>
