<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Seedance 2.5 30 second scene structure</title>
  <desc id="desc">A timeline diagram showing how to structure a 30 second Seedance 2.5 prompt into opening, development, and final frame beats.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaff"/>
      <stop offset="1" stop-color="#f0fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#44215d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="48" fill="url(#bg)"/>
  <text x="105" y="120" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="3">30-SECOND PROMPT STRUCTURE</text>
  <text x="105" y="190" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="850">Do not prompt a still image. Prompt a scene arc.</text>
  <g filter="url(#shadow)">
    <rect x="110" y="330" width="1380" height="290" rx="36" fill="#fff" stroke="#ded8ff"/>
    <line x1="210" y1="475" x2="1390" y2="475" stroke="#d8d3ff" stroke-width="12" stroke-linecap="round"/>
    <circle cx="260" cy="475" r="34" fill="#7c5cff"/>
    <circle cx="800" cy="475" r="34" fill="#7c5cff"/>
    <circle cx="1340" cy="475" r="34" fill="#7c5cff"/>
    <text x="210" y="400" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="800">0–10s</text>
    <text x="650" y="400" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="800">10–20s</text>
    <text x="1190" y="400" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="800">20–30s</text>
    <text x="180" y="555" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Establish</text>
    <text x="625" y="555" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Develop</text>
    <text x="1175" y="555" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Resolve</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#6d6685" font-size="24">
    <text x="160" y="690">Open with the subject, setting, and visual promise.</text>
    <text x="160" y="728">Move the camera, reveal the action, or change the emotion.</text>
    <text x="160" y="766">End on a useful final frame: label, face, product, horizon, or CTA space.</text>
  </g>
  <rect x="1080" y="665" width="350" height="116" rx="28" fill="#17112a"/>
  <text x="1120" y="716" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Final-frame check</text>
  <text x="1120" y="753" fill="#d8d3ff" font-family="Inter, Arial, sans-serif" font-size="21">Can this still become a cover?</text>
</svg>
