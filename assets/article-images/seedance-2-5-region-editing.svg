<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Seedance 2.5 region editing decision flow</title>
  <desc id="desc">A diagram showing when to use local region editing instead of regenerating an entire Seedance 2.5 video clip.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaff"/>
      <stop offset="1" stop-color="#f2efff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#44215d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="48" fill="url(#bg)"/>
  <text x="105" y="118" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="3">REGION EDITING</text>
  <text x="105" y="188" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="850">Fix the small wrong thing. Keep the working scene.</text>
  <g filter="url(#shadow)">
    <rect x="120" y="310" width="380" height="380" rx="34" fill="#fff" stroke="#ded8ff"/>
    <rect x="175" y="370" width="270" height="170" rx="26" fill="#eefcff"/>
    <rect x="320" y="430" width="90" height="64" rx="12" fill="#ffedf5" stroke="#ff70a6" stroke-width="4" stroke-dasharray="12 8"/>
    <text x="165" y="610" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800">90% works</text>
    <text x="165" y="650" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="22">Only the label, hand,</text>
    <text x="165" y="680" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="22">face angle, or prop is off.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="610" y="310" width="380" height="380" rx="34" fill="#fff" stroke="#ded8ff"/>
    <text x="655" y="390" fill="#4d2fc8" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">ASK:</text>
    <text x="655" y="450" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Is the problem</text>
    <text x="655" y="490" fill="#17112a" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">local or global?</text>
    <text x="655" y="565" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="23">Local: one visible area.</text>
    <text x="655" y="605" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="23">Global: story, camera,</text>
    <text x="655" y="638" fill="#6d6685" font-family="Inter, Arial, sans-serif" font-size="23">timing, or identity drift.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1100" y="310" width="380" height="380" rx="34" fill="#17112a"/>
    <text x="1145" y="390" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Decision</text>
    <text x="1145" y="465" fill="#d8d3ff" font-family="Inter, Arial, sans-serif" font-size="24">Use region edit for</text>
    <text x="1145" y="500" fill="#d8d3ff" font-family="Inter, Arial, sans-serif" font-size="24">local corrections.</text>
    <text x="1145" y="575" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Regenerate when the</text>
    <text x="1145" y="610" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">scene logic is wrong.</text>
  </g>
  <path d="M515 500 L595 500" stroke="#7c5cff" stroke-width="8" stroke-linecap="round"/>
  <path d="M1005 500 L1085 500" stroke="#7c5cff" stroke-width="8" stroke-linecap="round"/>
</svg>
